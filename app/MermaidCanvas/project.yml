name: MermaidCanvas
options:
  bundleIdPrefix: com.kimlundqvist
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.18.0

settings:
  base:
    DEVELOPMENT_TEAM: SFXR8MV6MP
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    # EN enda version (= AppVersion.version). Båda fälten lika. Hålls synkad av scripts/arch-check.py.
    MARKETING_VERSION: "1.5.7"
    CURRENT_PROJECT_VERSION: "1.5.7"

targets:
  MermaidCanvas:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Mermaid
      - path: Sources/ClaudeCode
      - path: Resources
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Visuali2e
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimlundqvist.mermaidcanvas
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: YES
        DEVELOPMENT_TEAM: SFXR8MV6MP
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # 1.1 dual-platform: native macOS-skal (menyrads-popup) som DELAR samma Sources/ som iOS.
  # OBS: macOS Info.plist ligger UTANFÖR Sources/ (annars förorenar den iOS-targetens plist).
  MermaidCanvasMac:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        excludes:
          - "main.swift"   # iOS-entré (UIApplicationMain top-level) → krockar med macOS @main
      - path: Sources/Mermaid
      - path: Sources/ClaudeCode
      - path: Resources
    info:
      path: Info-macOS.plist
      properties:
        CFBundleDisplayName: Visuali2e
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        # 1.5.7: LSUIElement borttagen → riktig Mac-app (Dock-ikon + fönster), inte menyrads-popup.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimlundqvist.mermaidcanvas.mac
        DEVELOPMENT_TEAM: SFXR8MV6MP
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MermaidCanvasUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: MermaidCanvas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimlundqvist.mermaidcanvas.uitests
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: SFXR8MV6MP
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MermaidCanvas

  MermaidCanvasUnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UnitTests
    dependencies:
      - target: MermaidCanvas
      - package: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimlundqvist.mermaidcanvas.unittests
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: SFXR8MV6MP
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/MermaidCanvas.app/MermaidCanvas
        BUNDLE_LOADER: $(TEST_HOST)

  # 1.1: macOS-testtarget — bevisar att DELADE hjärnan (parser + render) funkar kompilerad för macOS.
  MermaidCanvasMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MacTests
    dependencies:
      - target: MermaidCanvasMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimlundqvist.mermaidcanvas.mactests
        DEVELOPMENT_TEAM: SFXR8MV6MP
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/MermaidCanvasMac.app/Contents/MacOS/MermaidCanvasMac
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  MermaidCanvas:
    build:
      targets:
        MermaidCanvas: all
        MermaidCanvasUITests: [test]
        MermaidCanvasUnitTests: [test]
    test:
      targets:
        - MermaidCanvasUnitTests
        - MermaidCanvasUITests
  MermaidCanvasMac:
    build:
      targets:
        MermaidCanvasMac: all
        MermaidCanvasMacTests: [test]
    test:
      targets:
        - MermaidCanvasMacTests
