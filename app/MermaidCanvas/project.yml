name: MermaidCanvas
options:
  bundleIdPrefix: com.kimlundqvist
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: SFXR8MV6MP
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MermaidCanvas:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Mermaid
      - path: Sources/ClaudeCode
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimlundqvist.mermaidcanvas
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: SFXR8MV6MP
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: Visuali2e
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MermaidCanvasUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: MermaidCanvas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimlundqvist.mermaidcanvas.uitests
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: SFXR8MV6MP
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MermaidCanvas

  MermaidCanvasUnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UnitTests
    dependencies:
      - target: MermaidCanvas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimlundqvist.mermaidcanvas.unittests
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: SFXR8MV6MP
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/MermaidCanvas.app/MermaidCanvas
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  MermaidCanvas:
    build:
      targets:
        MermaidCanvas: all
        MermaidCanvasUITests: [test]
        MermaidCanvasUnitTests: [test]
    test:
      targets:
        - MermaidCanvasUnitTests
        - MermaidCanvasUITests
